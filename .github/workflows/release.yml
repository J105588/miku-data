name: Build and Release VSIX

on:
  push:
    branches:
      - main
    paths:
      - 'package.json'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Check version change
        id: check_version
        run: |
          NEW_VERSION=$(jq -r .version package.json)
          OLD_VERSION=$(git show HEAD^:package.json | jq -r .version || echo "0.0.0")
          
          if [ "$NEW_VERSION" != "$OLD_VERSION" ]; then
            echo "Version changed from $OLD_VERSION to $NEW_VERSION"
            echo "version=$NEW_VERSION" >> $GITHUB_OUTPUT
            echo "changed=true" >> $GITHUB_OUTPUT
          else
            echo "No version change detected."
            echo "changed=false" >> $GITHUB_OUTPUT
          fi

      - name: Setup Node.js
        if: steps.check_version.outputs.changed == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Package extension
        if: steps.check_version.outputs.changed == 'true'
        run: npx @vscode/vsce package -o miku-sidebar-${{ steps.check_version.outputs.version }}.vsix

      - name: Create Release
        if: steps.check_version.outputs.changed == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.check_version.outputs.version }}
          name: Release v${{ steps.check_version.outputs.version }}
          files: miku-sidebar-${{ steps.check_version.outputs.version }}.vsix
          token: ${{ secrets.GITHUB_TOKEN }}
          draft: false
          prerelease: false
